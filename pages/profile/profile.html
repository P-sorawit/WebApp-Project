<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="navbar.css">
    <link rel="stylesheet" href="profile.css">
    <title>Profile</title>
</head>

<body>
    <script src="../../scripts/profile.js">
    </script>
    <nav></nav>
    <div class="frame_profile">
        <div class="photo_rating_info">
            <div id="img_container">
                <h1>Profile</h1>
                <img id="profile-img" alt="your_photo">

                <input type="file" id="upload-img" accept="image/*" hidden onchange="previewImage(event)">

                <div id="rating">
                    <div id="point_frame">
                        <h3>Review</h3>
                        <h3 id="point"></h3>
                    </div>
                    <div id="star"></div>

                </div>
            </div>
            <button id="edit-btn" class="btn btn-edit" onclick="toggleEdit()">Edit Profile</button>
            <button id="save-btn" class="btn btn-save" onclick="saveProfile()">Save Changes</button>
        </div>
        <div class="personal_info">
            <p>Username</p>
            <input id="Username" type="text" readonly>
            <p>Email</p>
            <input id="Email" type="text" readonly>
            <p>Phone</p>
            <input id="Phone" type="text" readonly>
            <p>About</p>
            <textarea id="About" rows="6" type="text" maxlength="500"
                readonly></textarea>
        </div>
    </div>
    <footer></footer>
    <script type="module">
        import { generatedNavbar } from "../../scripts/navbar.js";
        import { generatedFooter } from "../../scripts/footer.js";
        generatedNavbar(true);
        generatedFooter();
    </script>
</body>

</html>
