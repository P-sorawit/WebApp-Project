<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="navbar.css">
    <link rel="stylesheet" href="profile.css">
    <title>Profile</title>
</head>

<body>
    <script>
        function toggleEdit() {
            document.getElementById('edit-btn').style.display = 'none';
            document.getElementById('save-btn').style.display = 'block';
            const username = document.getElementById('Username');
            const email = document.getElementById('Email');
            const phone = document.getElementById('Phone');
            const about = document.getElementById('About');
            const arrayElement = [username, email, phone, about];
            for (const element of arrayElement) {
                element.readOnly = false;
                element.style.borderColor = "#ffff";
                element.style.color = "black";
                element.style.backgroundColor = "#ffff";
            }

        }
        function saveProfile() {
            
            const username = document.getElementById('Username');
            const email = document.getElementById('Email');
            const phone = document.getElementById('Phone');
            const about = document.getElementById('About');
            const arrayElement = [username, email, phone, about];
            for (const element of arrayElement) {
                if (username.value.trim() === "") {
                    alert("Please fill username");
                    return;
                }else if(email.value.trim() === ""){
                    alert("Please fill Eamil");
                    return;
                }

                const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailPattern.test(email.value)) {
                    alert("รูปแบบอีเมลไม่ถูกต้อง");
                    email.focus();
                    return;
                }

                const phonePattern = /^[0-9]{9,10}$/;
                const purePhone = phone.value.replace(/-/g, "");
                if (!phonePattern.test(purePhone)) {
                    alert("กรุณากรอกเบอร์โทรศัพท์เป็นตัวเลข 9-10 หลัก");
                    phone.focus();
                    return;
                }
                element.readOnly = true;
                element.style.borderColor = "black";
                element.style.color = "#bbb8b8";
                element.style.backgroundColor = "#404040";
            }
            document.getElementById('edit-btn').style.display = 'block';
            document.getElementById('save-btn').style.display = 'none';
        }
    </script>
    <nav></nav>
    <div class="frame_profile">
        <div class="photo_rating_info">
            <div id="img_container">
                <h1>Profile</h1>
                <img src="https://lh3.googleusercontent.com/d/18d8yaUKgsN2MNaUsKkUxpuzECdlJvLi6" alt="your_photo">
                <div id="rating">
                    <div id="point_frame">
                        <h3>Review</h3>
                        <h3 id="point">4.0</h3>
                    </div>
                    <div id="star">
                        <p>&#9733;</p>
                        <p>&#9733;</p>
                        <p>&#9733;</p>
                        <p>&#9733;</p>
                        <p>&#9733;</p>
                    </div>

                </div>
            </div>
            <button id="edit-btn" class="btn btn-edit" onclick="toggleEdit()">Edit Profile</button>
            <button id="save-btn" class="btn btn-save" onclick="saveProfile()">Save Changes</button>
        </div>
        <div class="personal_info">
            <p>Username</p>
            <input id="Username" type="text" value="P.sorawit" readonly>
            <p>Email</p>
            <input id="Email" type="text" value="67010926@kmitl.ac.th" readonly>
            <p>Password</p>
            <input id="Password" type="text" value="********" readonly>
            <p>Phone</p>
            <input id="Phone" type="text" value="085-123456" readonly>
            <p>About</p>
            <textarea id="About" rows="6" type="text"
                readonly>I am a dedicated and results-driven professional with a passion for solving complex problems and delivering high-quality work. With a background in [Your Industry/Field], I thrive in collaborative environments where I can leverage my skills in [Skill 1] and [Skill 2] to drive meaningful impact. I am a lifelong learner committed to staying ahead of industry trends and consistently looking for ways to streamline processes and add value to my team.</textarea>
        </div>
    </div>
