<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="../../styles/navbar.css">
    <link rel="stylesheet" type="text/css" href="../sign_in/sign.css">
    <title>Document</title>
</head>
<body>
    <nav>
    </nav>
    <div class="frame_sign">
        <div id="photo">
            <img src="https://img.freepik.com/premium-vector/forgot-password-concept-illustration_114360-1095.jpg" alt="forgot_password">
        </div>
        <div id="info">
            <div>
                <H1>Reset Password</H1>
            </div>
            <form action="" method="post">
                <p>Email</p>
                <input id="email" name="email" type="email" placeholder="xxx@gmial.com" required>
                <p>Phone Number </p>
                <input id="phone" name="phone" type="tel" placeholder="08xxxxxxxx" pattern="[0-9]{3}-[0-9]{7}" required>
                <p></p>
                <input id="submitForGotpass" type="submit" value="Send">
            </form>
        </div>
    </div>
    <footer></footer>

    <script type="module">
        import { generatedNavbar } from "../../scripts/navbar.js";
        import { generatedFooter } from "../../scripts/footer.js";
        generatedNavbar(false);
        generatedFooter();
    </script>
</body>
</html>
