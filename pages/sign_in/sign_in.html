<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="navbar.css">
    <link rel="stylesheet" href="sign.css">
    <script src="sign_in.js"></script>
    <title>Document</title>
</head>
<body>
    <nav></nav>
    <div class="frame_sign">
        <div id="photo">
            <img  src="https://lh3.googleusercontent.com/d/1IpKFDMqQco5x1x_LZ_pOl_SIh91oMay4" alt="sign-in">
        </div>
        <div id="info">
            <div>
                <H1>Sign In</H1>
            </div>
            <form action="" method="post">
                <p>Email</p>
                <input id="email" name="email" type="email" placeholder="Enter your Email" required>
                <p>Password</p>
                <input id="password" name="password" type="password" placeholder="Enter your Password" required>
                <div class="ask_sign">
                    <div id="showpass">
                        <input type="checkbox" id="box_showpass" onclick="checkbox_sign()">
                        <p>Show password?</p>
                    </div>
                    <a href="../forgotpass/forgotpass.html">Forgot Password</a>
                </div>
                <input id="submitSign" type="submit" value="Sign In">
            </form>
        </div>
    </div>
    <script type="module">
        import { generatedNavbar } from "../../scripts/navbar.js";
            generatedNavbar();
    </script>  
</body>
</html>
