<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="navbar.css">
    <link rel="stylesheet" href="sign.css">
    <title>Document</title>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <a href="main_guest.html">
                    <img src="https://lh3.googleusercontent.com/d/1WYLZOzQQMg7YrPJY8_3AeAsmc5JWCE0Z" alt="Logo">
                </a>
            </div>
            <input type="checkbox" id="check_nav">
            <label for="check_nav" class="menu_icon">
                <svg id="open" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor"
                    viewBox="0 0 24 24">
                    <path d="M3 5h18v2H3zm0 6h18v2H3zm0 6h18v2H3z"></path>
                </svg>
                <svg id="close" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor"
                    viewBox="0 0 24 24">
                    <path
                        d="m7.76 14.83-2.83 2.83 1.41 1.41 2.83-2.83 2.12-2.12.71-.71.71.71 1.41 1.42 3.54 3.53 1.41-1.41-3.53-3.54-1.42-1.41-.71-.71 5.66-5.66-1.41-1.41L12 10.59 6.34 4.93 4.93 6.34 10.59 12l-.71.71z">
                    </path>
                </svg>
            </label>
            <div class="nav-links">
                <ul class="menu">
                    <li><a href="#">Post</a></li>
                    <li><a href="#">My activity</a></li>
                    <li><a href="#">Notification</a></li>
                    <li><a href="#">Profile</a></li>
                </ul>
                <br>
                <div class="auth-buttons">
                    <a href="sign_in.html" class="btn-signin">Sign in</a>
                    <a href="sign_up.html" class="btn-register">Sign up</a>
                </div>
            </div>
        </div>
    </nav>
    <div class="frame_sign">
        <div id="photo">
            <img src="https://images-ext-1.discordapp.net/external/P8bEa27gVk0UTXe15YVbGyHmMtQBFaI7vDD3I9C7UrE/https/cdni.iconscout.com/illustration/premium/thumb/man-doing-online-registration-illustration-svg-download-png-11538642.png?format=webp&quality=lossless&width=578&height=563" alt="sign-up">
        </div>
        <div id="info">
            <div>
                <H1>Sign Up</H1>
            </div>
            <form action="" method="post">
                <p>Username</p>    
                <input id="username" name="username" type="text" placeholder="eg. P.sorawit" required>
                <p>Email</p>
                <input id="email" name="email" type="email" placeholder="eg. xxx@gmial.com" required>
                <p>Password</p>
                <input id="password" name="password" type="text" placeholder="eg. P@ssword" required>
                <p>Phone Number </p>
                <input id="phone" name="phone" type="tel" placeholder="eg. 089-xxxxxxx" pattern="[0-9]{3}-[0-9]{7}" required>
                <p></p>
                <input id="submitSign" type="submit" value="Join Us">
            </form>
        </div>
    </div>  
</body>
</html>
